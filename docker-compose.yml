services:
  app_moctra:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: knowledge_agent
    ports:
      - "3555:3555"
    env_file:
      - apps/app/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks:
      - app_network

  db:
    image: postgres:16-alpine
    container_name: db_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - apps/app/.env
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    restart: always
    networks:
      - app_network

volumes:
  postgres_data:
  redis_data:

networks:
  app_network:
    name: app_network
    driver: bridge