name: CD — Deploy VPS DEV

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: false
        default: 'main'

jobs:
  validate:
    name: Quality & Build Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.sha }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint codebase
        run: bun run lint

      - name: Build project
        run: bun run build

  deploy:
    name: Deploy to VPS
    needs: validate
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.sha }}
      
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: |
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh -o StrictHostKeyChecking=yes "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" 'bash -s' <<EOF
            set -euo pipefail

            cd /root/apps/knowledge-agent

            git pull origin ${{ github.event.inputs.branch || 'main' }}

            echo "Starting docker compose up..."
            docker compose up -d --build --remove-orphans

            echo "Reloading Nginx webserver..."
            cd /root/apps/webserver
            docker compose exec -T webserver nginx -s reload

            echo "Cleaning up build cache..."
            docker builder prune -f --filter "until=48h"

            echo "Cleaning up old images..."
            docker image prune -af --filter "until=72h"

            echo "Deployment completed."
          EOF
